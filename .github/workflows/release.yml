name: Release

# Triggers on pushing a tag like v1.0.0 or v0.2.3.
# Builds the Windows installer + portable artifact, generates SHA-256 sums,
# and attaches everything to a GitHub Release.
#
# The release is created in draft mode so you can edit the changelog before
# publishing. Set `draft: false` below if you want it published immediately.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write # required to create the Release and upload assets

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.11"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build NSIS installer + portable folder
        run: npm run electron-installer
        env:
          # electron-builder's GH publishing needs this token; even when we
          # publish via the dedicated action below, the build step sometimes
          # tries to read GH metadata.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist-electron -Filter "*.exe" -Recurse
          if (-not $files) { throw "No .exe found in dist-electron" }
          $out = @()
          foreach ($f in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $f.FullName).Hash.ToLower()
            $out += "$hash  $($f.Name)"
          }
          $out | Out-File -Encoding ascii dist-electron/SHA256SUMS.txt
          Get-Content dist-electron/SHA256SUMS.txt

      - name: Upload artifacts (intermediate)
        uses: actions/upload-artifact@v4
        with:
          name: chesskit-windows
          path: |
            dist-electron/*.exe
            dist-electron/SHA256SUMS.txt
            dist-electron/latest.yml
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist-electron/*.exe
            dist-electron/SHA256SUMS.txt
            dist-electron/latest.yml
          fail_on_unmatched_files: true
